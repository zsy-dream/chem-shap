{% extends "base.html" %}

{% block title %}{{ title or '页面异常' }} - 智析实验{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-10 col-xl-8">
        <div class="card shadow-sm">
            <div class="card-body p-4 p-md-5">
                <div class="d-flex align-items-start justify-content-between gap-3 flex-wrap">
                    <div>
                        <h3 class="mb-2"><i class="fas fa-triangle-exclamation text-warning me-2"></i>{{ title or '页面异常' }}</h3>
                        <div class="text-muted mb-3">{{ description or '系统在处理请求时遇到异常。' }}</div>
                        {% if code %}
                        <span class="badge bg-light text-dark border">HTTP {{ code }}</span>
                        {% endif %}
                    </div>
                    <div class="d-flex gap-2 flex-wrap">
                        <a class="btn btn-primary" href="/"><i class="fas fa-house me-2"></i>返回首页</a>
                        <a class="btn btn-outline-secondary" href="javascript:history.back();"><i class="fas fa-arrow-left me-2"></i>返回上一页</a>
                        <a class="btn btn-outline-danger" href="/logout"><i class="fas fa-power-off me-2"></i>重新登录</a>
                    </div>
                </div>

                {% if message %}
                <div class="mt-4">
                    <div class="small text-muted mb-2">错误信息</div>
                    <pre class="p-3 mb-0" style="background:#0b1220;color:#e2e8f0;border-radius:12px;overflow:auto;max-height:220px;">{{ message }}</pre>
                </div>
                {% endif %}
            </div>
        </div>
    </div>
</div>
{% endblock %}
